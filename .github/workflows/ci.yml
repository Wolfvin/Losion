# ============================================================================
# Losion Framework — CI/CD Pipeline
# ============================================================================
# Runs on every push and pull request to main/develop branches.
# Steps:
#   1. Lint with ruff
#   2. Type-check with mypy
#   3. Run pytest test suite
#   4. Run end-to-end integration test (train_test.py)
#   5. Upload test_results.json as artifact
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop, "v*"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check losion/ tests/
      - name: Mypy check
        run: mypy losion/ --config-file pyproject.toml
        continue-on-error: true  # mypy is advisory for now

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[all]"
      - name: Run pytest
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # Some tests may need GPU

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[all]"
      - name: Run end-to-end integration test
        run: python scripts/train_test.py
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test_results.json
