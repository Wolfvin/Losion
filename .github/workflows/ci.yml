name: Losion CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linting deps
        run: |
          pip install ruff mypy
      - name: Ruff check
        run: ruff check losion/ --ignore=E501,F401,F841 --per-file-ignores="**/__init__.py:F401"
      - name: MyPy type check
        run: mypy losion/ --ignore-missing-imports --no-strict-optional

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          INIT_VER=$(python -c "import re; m=re.search(r'__version__\s*=\s*[\"\\']([^\"\\']+)', open('losion/__init__.py').read()); print(m.group(1))")
          PYPROJ_VER=$(python -c "import re; m=re.search(r'version\s*=\s*[\"\\']([^\"\\']+)', open('pyproject.toml').read()); print(m.group(1))")
          SETUP_VER=$(python -c "import re; m=re.search(r'version\s*=\s*[\"\\']([^\"\\']+)', open('setup.py').read()); print(m.group(1))")
          echo "losion/__init__.py: $INIT_VER"
          echo "pyproject.toml:     $PYPROJ_VER"
          echo "setup.py:           $SETUP_VER"
          if [ "$INIT_VER" != "$PYPROJ_VER" ] || [ "$INIT_VER" != "$SETUP_VER" ]; then
            echo "ERROR: Version mismatch!"
            exit 1
          fi
          echo "Version sync OK: $INIT_VER"

  test:
    runs-on: ubuntu-latest
    needs: [lint, version-sync]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --timeout=300
      - name: Run integration test
        run: |
          python scripts/train_test.py --quick
      - name: Validate test_results.json
        run: |
          python -c "
          import json
          with open('test_results.json') as f:
              data = json.load(f)
          score = data.get('total_score', 0)
          issues = data.get('issues', [])
          print(f'Total score: {score}/10')
          print(f'Issues: {issues}')
          if score < 9.0:
              print('ERROR: Score below threshold!')
              exit(1)
          if issues:
              print('WARNING: Issues found:')
              for i in issues:
                  print(f'  - {i}')
          print('Validation passed.')
          "
