name: Losion CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linting deps
        run: |
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check losion/ --output-format=github
      - name: MyPy check
        run: mypy losion/ --ignore-missing-imports || true

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check version consistency
        run: |
          python -c "
          import re, sys

          # Read versions from all sources
          with open('losion/__init__.py') as f:
              init_content = f.read()
          init_ver = re.search(r'__version__\s*=\s*[\"\\']([^\"\\']+)', init_content)
          
          with open('pyproject.toml') as f:
              toml_content = f.read()
          toml_ver = re.search(r'version\s*=\s*[\"\\']([^\"\\']+)', toml_content)
          
          with open('setup.py') as f:
              setup_content = f.read()
          setup_ver = re.search(r'version\s*=\s*[\"\\']([^\"\\']+)', setup_content)

          versions = {
              '__init__.py': init_ver.group(1) if init_ver else 'NOT FOUND',
              'pyproject.toml': toml_ver.group(1) if toml_ver else 'NOT FOUND',
              'setup.py': setup_ver.group(1) if setup_ver else 'NOT FOUND',
          }

          print('Version check:')
          for src, ver in versions.items():
              print(f'  {src}: {ver}')

          unique_versions = set(versions.values())
          if len(unique_versions) != 1:
              print(f'ERROR: Version mismatch! {versions}')
              sys.exit(1)
          print('All versions match!')
          "

  test:
    runs-on: ubuntu-latest
    needs: [lint, version-sync]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install einops
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -x
      - name: Run train test
        run: |
          python scripts/train_test.py
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test_results.json
          retention-days: 7
